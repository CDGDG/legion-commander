<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Legion Commander</title>
  <meta name="description" content="액션 로그라이트 + 자동전투 군단 지휘 게임" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffd700" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Legion" />
  <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08080f;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    canvas { display: block; }
    .font-preload {
      position: absolute; left: -9999px; top: -9999px;
      visibility: hidden; pointer-events: none;
    }
    .font-preload .a { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
    .font-preload .b { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; }

    /* === Portrait rotation overlay for mobile === */
    /* Only shown on small-height portrait screens (phones/tablets held vertically) */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #08080f;
      color: #ffd700;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', sans-serif;
      text-align: center;
      padding: 20px;
    }
    #rotate-overlay .icon {
      font-size: 72px;
      margin-bottom: 20px;
      animation: rotatePhone 1.8s ease-in-out infinite;
      display: inline-block;
    }
    #rotate-overlay h2 {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    #rotate-overlay p {
      font-size: 14px;
      color: #aaaaaa;
      max-width: 320px;
      line-height: 1.5;
    }
    @keyframes rotatePhone {
      0%, 100% { transform: rotate(0deg); }
      40%, 60% { transform: rotate(-90deg); }
    }
    /* Show overlay when in portrait AND screen is phone-sized (< 800px wide OR < 500px tall in landscape) */
    @media (orientation: portrait) and (max-width: 900px) {
      #rotate-overlay { display: flex; }
      canvas { display: none; }
    }
  </style>
</head>
<body>
  <div class="font-preload" aria-hidden="true">
    <span class="a">LEGION 1234</span>
    <span class="b">군단지휘관 강화</span>
  </div>
  <div id="rotate-overlay">
    <div class="icon">📱</div>
    <h2>가로 모드로 돌려주세요</h2>
    <p>Legion Commander는 가로 화면에서 플레이하도록 제작되었습니다.<br/>기기를 가로로 회전시켜주세요.</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
